<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/connexion.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="{{ url_for('static', filename='js/jscript.js') }}" defer></script>
  <title>Réinitialiser le mot de passe — ONDA Essaouira</title>
</head>
<body>
  <div id="connexionContainer">
    <div class="login-header">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo ONDA" id="logo">
      <div class="login-title">Nouveau mot de passe</div>
      <div class="login-subtitle">Bonjour {{ pseudo }}</div>
    </div>
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="error-msg" style="display:block;">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form id="reset-password-form" action="{{ url_for('auth.reset_password', token=token) }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-key"></i> Nouveau mot de passe</label>
          <div class="input-wrap">
            <i class="input-icon fa-solid fa-lock"></i>
            <input class="form-input" type="password" id="password" name="password" placeholder="6 caractères minimum" required minlength="6" autocomplete="new-password">
            <button type="button" class="toggle-pw" id="toggle-pw"><i class="fa-solid fa-eye-slash"></i></button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-key"></i> Confirmer le mot de passe</label>
          <div class="input-wrap">
            <i class="input-icon fa-solid fa-lock"></i>
            <input class="form-input" type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
          </div>
        </div>
        <button type="submit" class="btn-login"><i class="fa-solid fa-rotate" style="margin-right:8px;"></i>Réinitialiser le mot de passe</button>
        <div class="login-footer" style="justify-content:center;">
          <a href="{{ url_for('auth.login') }}" class="login-link"><i class="fa-solid fa-arrow-left" style="margin-right:4px;"></i>Retour à la connexion</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
